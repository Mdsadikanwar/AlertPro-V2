<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexTraders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(180deg, #0a0e1a 0%, #1a2333 100%); 
      color: #e2e8f0; 
      font-family: Arial, sans-serif; 
      min-height: 100vh;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 30px; border-bottom: 1px solid #1e293b;
    }
    .logo { font-size: 20px; font-weight: 600; }
    .navbar {
      display: flex; gap: 8px; padding: 15px 30px; flex-wrap: wrap;
    }
    .nav-btn {
      padding: 8px 14px; background: #334155; color: #cbd5e1; 
      border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .container { text-align: center; padding: 60px 20px; }
    .container h1 { 
      font-size: 40px; color: #10b981; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .container p { color: #94a3b8; margin-bottom: 40px; }
    .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    .main-btn {
      padding: 15px 30px; background: #475569; color: white; 
      border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
      cursor: pointer;
    }
    .main-btn.crypto { background: #64748b; }
    .main-btn.stock { background: #3b82f6; }
    .main-btn.commodity { background: #f59e0b; color: #0a0e1a; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">⚡ ApexTraders</div>
    <div style="color: #94a3b8;">Professional AI</div>
  </div>

  <div class="navbar">
    <button class="nav-btn">🏠 Home</button>
    <button class="nav-btn">📊 Dashboard</button>
    <button class="nav-btn">💰 Trading</button>
    <button class="nav-btn">🤖 Strategies</button>
    <button class="nav-btn">📈 Backtest</button>
    <button class="nav-btn">⚙️ Settings</button>
    <button class="nav-btn">📝 Logs</button>
  </div>

  <div class="container">
    <h1>⚡ ApexTraders</h1>
    <p>Multi-Coin Paper Trading + Live Signals ☁️ Synced</p>
    
    <div class="btn-group">
      <button class="main-btn crypto" onclick="alert('Crypto Dashboard Coming')">📊 CRYPTO TERMINAL</button>
      <button class="main-btn stock" onclick="alert('Coming Soon')">📈 STOCK MARKET</button>
      <button class="main-btn commodity" onclick="alert('Coming Soon')">🛢️ COMMODITY</button>
    </div>
  </div>
</body>
</html>
