<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexTraders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; color: #e2e8f0; font-family: Arial; }
    .topbar { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #1e293b; }
    .logo { font-size: 20px; font-weight: 600; color: #10b981; }
    .navbar { display: flex; gap: 8px; padding: 15px 20px; flex-wrap: wrap; background: #111827; }
    .nav-btn { padding: 8px 14px; background: #334155; color: #cbd5e1; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .container { text-align: center; padding: 60px 20px; }
    .container h1 { font-size: 40px; color: #10b981; margin-bottom: 10px; }
    .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 20px; }
    .main-btn { padding: 15px 40px; width: 300px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-crypto { background: #475569; color: white; }
    .btn-stock { background: #3b82f6; color: white; }
    .btn-commodity { background: #f59e0b; color: #0a0e1a; }
    .card { background: #111827; padding: 20px; border-radius: 12px; margin: 20px; }
    .select-group { display: flex; gap: 10px; }
    select { flex: 1; padding: 12px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; }
    .price { font-size: 36px; color: #f59e0b; font-weight: 700; text-align: center; margin: 10px 0; }
    .change { color: #10b981; text-align: center; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <!-- HOME SCREEN -->
  <div id="home-screen">
    <div class="topbar">
      <div class="logo">⚡ ApexTraders</div>
      <div style="color: #94a3b8;">Professional AI</div>
    </div>
    <div class="container">
      <h1>⚡ ApexTraders</h1>
      <!-- YE LINE HATA DI -->
      <div class="btn-group">
        <button class="main-btn btn-crypto" onclick="showCrypto()">📊 CRYPTO TERMINAL</button>
        <button class="main-btn btn-stock" onclick="alert('Coming Soon')">📈 STOCK MARKET</button>
        <button class="main-btn btn-commodity" onclick="alert('Coming Soon')">🛢️ COMMODITY</button>
      </div>
    </div>
  </div>

  <!-- CRYPTO SCREEN -->
  <div id="crypto-screen" class="hidden">
    <div class="topbar">
      <div class="logo">⚡ ApexTraders</div>
      <div style="color: #94a3b8;">Professional AI</div>
    </div>

    <div class="navbar">
      <button class="nav-btn" onclick="showHome()">🏠 Home</button>
      <button class="nav-btn">📊 Dashboard</button>
      <button class="nav-btn">💰 Trading</button>
      <button class="nav-btn">🤖 Strategies</button>
      <button class="nav-btn">📈 Backtest</button>
      <button class="nav-btn">⚙️ Settings</button>
      <button class="nav-btn">📝 Logs</button>
    </div>

    <div class="card">
      <div class="select-group">
        <select><option>Bitcoin (BTC)</option><option>Ethereum (ETH)</option></select>
        <select style="max-width: 100px;"><option>USD</option></select>
      </div>
    </div>

    <div class="card">
      <div style="text-align:center; color:#94a3b8;">BTC/USD</div>
      <div class="price">$63798.00</div>
      <div class="change">▲ 0.98% (24h)</div>
      <div style="text-align:center; margin: 10px 0;">Active: <span style="background:#10b981; padding:4px 10px; border-radius:6px;">Hiw</span></div>
      <div style="display:flex; justify-content:space-around; margin-top:15px;">
        <div><div style="color:#94a3b8; font-size:12px;">24h High</div><div>$64554.00</div></div>
        <div><div style="color:#94a3b8; font-size:12px;">24h Low</div><div>$62955.00</div></div>
      </div>
    </div>
  </div>

<script>
  function showCrypto() {
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('crypto-screen').classList.remove('hidden');
  }
  function showHome() {
    document.getElementById('crypto-screen').classList.add('hidden');
    document.getElementById('home-screen').classList.remove('hidden');
  }
</script>
</body>
</html>
