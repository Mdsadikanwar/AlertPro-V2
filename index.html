<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AlertPro Terminal</title>
  <style>
    body { background: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; text-align: center; }
    .header { margin-bottom: 40px; }
    .header h1 { color: #58a6ff; font-size: 32px; margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .header p { color: #8b949e; }
    
    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 900px; margin: auto; }
    
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 25px; cursor: pointer; transition: 0.2s; text-align: left; }
    .card:hover { border-color: #58a6ff; transform: translateY(-5px); }
    .card h2 { margin: 0 0 10px 0; font-size: 22px; display: flex; align-items: center; gap: 10px; }
    .card p { color: #8b949e; margin: 0; font-size: 14px; }
    
    .coming { background: #f85149; color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 5px; margin-top: 10px; display: inline-block; }
    .footer { margin-top: 50px; color: #8b949e; font-size: 12px; }
    
    #dashboard { display: none; max-width: 800px; margin: auto; text-align: left; }
    .back-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
    .box { background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; }
  </style>
</head>
<body>

  <div id="landing">
    <div class="header">
      <h1>🔔 AlertPro Terminal</h1>
      <p>Select Market to Manage Strategies</p>
    </div>

    <div class="container">
      <div class="card" onclick="openMarket('crypto')">
        <h2>₿ CRYPTO</h2>
        <p>BTC, ETH, Altcoins • Real-time Signal Strategies</p>
      </div>

      <div class="card" onclick="openMarket('stock')">
        <h2>📊 SHARE MARKET</h2>
        <p>Nifty 50, Bank Nifty • Professional Trading Setup</p>
        <span class="coming">COMING SOON</span>
      </div>

      <div class="card" onclick="openMarket('commodity')">
        <h2>🥇 COMMODITY</h2>
        <p>Gold, Silver, Oil • Futures & Spot Trading</p>
        <span class="coming">COMING SOON</span>
      </div>
    </div>
    <div class="footer">Powered by AlertPro AI • v2.0</div>
  </div>

  <div id="dashboard">
    <button class="back-btn" onclick="goBack()">← Back to Terminal</button>
    <div class="box" id="dashboard-content"></div>
  </div>

<script>
  function openMarket(market){
    document.getElementById('landing').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    
    let content = '';
    if(market === 'crypto'){
      content = `<h2>₿ CRYPTO Dashboard</h2>
      <p>BTC Price: <b id="price">Loading...</b></p>
      <button onclick="alert('Backtest Coming')" style="background:#238636;color:#fff;padding:10px;border:none;border-radius:6px;">Run Backtest</button>`;
      fetchCrypto();
    } else {
      content = `<h2>${market.toUpperCase()} Dashboard</h2><p>API Coming Soon for ${market}</p>`;
    }
    document.getElementById('dashboard-content').innerHTML = content;
  }

  function goBack(){
    document.getElementById('landing').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
  }

  async function fetchCrypto(){
    let res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd`);
    let data = await res.json();
    document.getElementById('price').innerText = '$' + data.bitcoin.usd.toLocaleString();
  }
</script>

</body>
</html>
