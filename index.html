<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexTraders</title>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: Arial; margin: 0; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; padding: 20px; }
    .header h1 { color: #10b981; font-size: 32px; }
    .navbar { display: flex; gap: 10px; padding: 15px; background: #1e293b; flex-wrap: wrap; justify-content: center; }
    .nav-btn { padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .card { background: #1e293b; padding: 20px; border-radius: 12px; margin: 20px 0; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>⚡ ApexTraders</h1>
    </header>

    <!-- NAVBAR HAR PAGE PE DIKHEGA -->
    <nav class="navbar" id="navbar">
      <button class="nav-btn" onclick="showTab('home')">🏠 Home</button>
      <button class="nav-btn" onclick="showTab('dashboard')">📊 Dashboard</button>
      <button class="nav-btn" onclick="alert('Coming Soon')">💰 Trading</button>
    </nav>

    <main id="tab-content"></main>
  </div>

  <script>
    function showTab(tab) {
      const content = document.getElementById('tab-content');
      if(tab === 'home') {
        content.innerHTML = `
          <div class="card">
            <h2>⚡ ApexTraders</h2>
            <p>Multi-Coin Paper Trading + Live Signals</p>
          </div>
        `;
      }
      if(tab === 'dashboard') {
        content.innerHTML = `
          <div class="card">
            <h2>📊 CRYPTO DASHBOARD</h2>
            <p>यहां तेरा पुराना dashboard आएगा</p>
          </div>
        `;
      }
    }
    showTab('home'); // load hote hi home
  </script>
</body>
</html>
