<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TradeX Pro - AI Trading Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --muted: #8b949e; --accent: #00d4aa; --red: #f85149; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
   .header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
   .header h1 { color: var(--accent); font-size: 28px; margin: 0; }
   .header p { color: var(--muted); margin: 5px 0 0 0; }

    #landing { padding: 40px 20px; max-width: 1000px; margin: auto; }
   .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
   .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; cursor: pointer; transition: 0.2s; }
   .card:hover { border-color: var(--accent); transform: translateY(-5px); }
   .card h2 { margin: 0 0 10px 0; font-size: 20px; display: flex; align-items: center; gap: 10px; }
   .card p { color: var(--muted); margin: 0; font-size: 14px; }
   .coming { background: var(--red); color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 5px; margin-top: 10px; display: inline-block; }

    #dashboard { display: none; padding: 20px; max-width: 1000px; margin: auto; }
   .back-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
   .box { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; }
   .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    select, input, button { width: 100%; padding: 10px; margin-top: 8px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; }
   .btn { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
   .btn:hover { opacity: 0.9; }
   .result { margin-top: 15px; padding: 15px; background: var(--bg); border-radius: 8px; }
   .profit { color: var(--accent); }.loss { color: var(--red); }
   .footer { text-align: center; padding: 20px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); }
    @media(max-width: 768px) {.grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="header">
    <h1>🚀 TradeX Pro</h1>
    <p>AI Powered Trading & Alert Terminal</p>
  </div>

  <div id="landing">
    <div class="container">
      <div class="card" onclick="openMarket('crypto')">
        <h2>₿ CRYPTO</h2>
        <p>BTC, ETH, Altcoins • Live Price + Backtest + Alerts</p>
      </div>
      <div class="card" onclick="openMarket('stock')">
        <h2>📊 SHARE MARKET</h2>
        <p>Nifty 50, Bank Nifty • Professional Trading Setup</p>
        <span class="coming">COMING SOON</span>
      </div>
      <div class="card" onclick="openMarket('commodity')">
        <h2>🥇 COMMODITY</h2>
        <p>Gold, Silver, Oil • Futures & Spot Trading</p>
        <span class="coming">COMING SOON</span>
      </div>
    </div>
  </div>

  <div id="dashboard">
    <button class="back-btn" onclick="goBack()">← Back to Terminal</button>
    <div id="dashboard-content"></div>
  </div>

  <div class="footer">Powered by TradeX AI • v2.1</div>

<script>
  let chart;
  function openMarket(market){
    document.getElementById('landing').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    if(market === 'crypto'){
      document.getElementById('dashboard-content').innerHTML = `
      <div class="grid-2">
        <div class="box">
          <h3>📊 Live Price</h3>
          <select id="coin" onchange="loadCrypto()"><option value="bitcoin">BTC</option><option value="ethereum">ETH</option><option value="solana">SOL</option></select>
          <h2 id="price">Loading...</h2>
          <canvas id="priceChart"></canvas>
        </div>
        <div class="box">
          <h3>📈 Backtest - EMA Crossover</h3>
          <select id="bcoin"><option value="bitcoin">BTC</option><option value="ethereum">ETH</option></select>
          <input id="days" type="number" value="90" placeholder="Days">
          <button class="btn" onclick="runBacktest()">Run Backtest</button>
          <div id="result" class="result"></div>
        </div>
      </div>`;
      loadCrypto();
    } else {
      document.getElementById('dashboard-content').innerHTML = `<div class="box"><h2>${market.toUpperCase()} Dashboard</h2><p>API Coming Soon for ${market}</p></div>`;
    }
  }

  function goBack(){
    document.getElementById('landing').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    if(chart) chart.destroy();
  }

  async function loadCrypto(){
    let coin = document.getElementById('coin').value;
    let res1 = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coin}&vs_currencies=usd`);
    let data1 = await res1.json();
    document.getElementById('price').innerText = '$' + data1[coin].usd.toLocaleString();

    let res2 = await fetch(`https://api.coingecko.com/api/v3/coins/${coin}/market_chart?vs_currency=usd&days=7`);
    let data2 = await res2.json();
    let prices = data2.prices.map(p => p[1]);
    let labels = data2.prices.map(p => new Date(p[0]).toLocaleDateString());

    if(chart) chart.destroy();
    chart = new Chart(document.getElementById('priceChart'), {
      type: 'line',
      data: { labels, datasets: [{ label: coin, data: prices, borderColor: '#00d4aa', tension: 0.1 }] },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
  }

  async function runBacktest(){
    let coin = document.getElementById('bcoin').value;
    let days = document.getElementById('days').value;
    document.getElementById('result').innerHTML = 'Fetching data...';

    let res = await fetch(`https://api.coingecko.com/api/v3/coins/${coin}/market_chart?vs_currency=usd&days=${days}`);
    let data = await res.json();
    let prices = data.prices.map(p => p[1]);

    let ema10 = prices.slice(-10).reduce((a,b)=>a+b)/10;
    let ema21 = prices.slice(-21).reduce((a,b)=>a+b)/21;
    let signal = ema10 > ema21? "BUY Signal 🟢" : "SELL Signal 🔴";
    let profit = ((prices[prices.length-1] - prices[0])/prices[0]*100).toFixed(2);

    document.getElementById('result').innerHTML = `
      <p><b>Last Price:</b> $${prices[prices.length-1].toFixed(2)}</p>
      <p><b>Signal:</b> ${signal}</p>
      <p><b>${days} Days P&L:</b> <span class="${profit>0?'profit':'loss'}">${profit}%</span></p>
    `;
  }
</script>

</body>
</html>
