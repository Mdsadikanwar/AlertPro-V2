<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexTraders - Pro Trading Terminal</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; padding: 20px; }
    .header h1 { color: #10b981; font-size: 32px; margin: 0; }
    .navbar { display: flex; gap: 10px; padding: 15px; background: #1e293b; flex-wrap: wrap; justify-content: center; }
    .nav-btn { padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .nav-btn.active { background: #059669; }
    .card { background: #1e293b; padding: 20px; border-radius: 12px; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>⚡ ApexTraders</h1>
      <p style="color: #94a3b8;">Professional AI</p>
    </header>

    <!-- HOME PE YE HIDE RAHEGA -->
    <nav class="navbar" id="navbar" style="display: none;"></nav>

    <main id="tab-content">
      <!-- Yahan JS se content aayega -->
    </main>
  </div>

  <!-- YE PATH SABSE IMPORTANT HAI -->
  <script src="./js/app.js"></script>
</body>
</html>
