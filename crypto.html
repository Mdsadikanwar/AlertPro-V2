<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ApexTraders - Crypto Terminal</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .tab-bar { display: flex; gap: 10px; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .tab-btn { background: var(--bg); border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ ApexTraders</h1>
    <p>Professional AI Trading & Alert Terminal</p>
    <button class="back-btn" onclick="window.location.href='index.html'">← Back to Terminal</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
    <button class="tab-btn" data-tab="backtest">📈 Backtest</button>
    <button class="tab-btn" data-tab="trading">💹 Trading</button>
    <button class="tab-btn" data-tab="logs">📜 Logs</button>
  </div>

  <div id="tab-content"></div>
  <div class="footer">Powered by ApexTraders AI • v5.0</div>

  <!-- DHYAN: yaha path assets/js/ hai -->
  <script src="assets/js/settings.js"></script>
  <script src="assets/js/tab-loader.js"></script>
  <script src="assets/js/tabs/dashboard.js"></script>
  <script src="assets/js/tabs/backtest.js"></script>
  <script src="assets/js/tabs/trading.js"></script>
  <script src="assets/js/tabs/logs.js"></script>
</body>
</html>
