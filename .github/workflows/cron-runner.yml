name: 24x7 ApexTraders Bot Runner

on:
  schedule:
    # यह हर 5 मिनट में इस वर्कफ्लो को ऑटोमैटिक रन करेगा
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # इससे आप गिटहब पर जाकर खुद भी "Run" बटन दबाकर टेस्ट कर सकते हैं

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Setup Node.js environment
      uses: actions/setup-node@v3
      with:
        node-version: '18'  # यहाँ हमने वर्जन सही कर दिया है

    - name: Install dependencies
      run: |
        if [ -f package.json ]; then npm install; fi

    - name: Trigger Bot Strategy Check
      run: |
        node assets/js/cron-trigger.js
